<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep: #0a1f14;
  --mist: #8fb8a0;
  --gold: #c9a84c;
  --cream: #f0ebe0;
}

html, body {
  width: 100%; height: 100%;
  background: var(--jade-deep);
  overflow: hidden;
  font-family: 'EB Garamond', serif;
  color: var(--cream);
}

.scene {
  position: relative;
  width: 100%; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ✨ ORBS LAYER */
.orbs {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}

.orb {
  position: absolute;
  bottom: -20px;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, rgba(143,184,160,0.8) 0%, rgba(143,184,160,0.2) 60%, transparent 100%);
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0.4;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) translateX(0) scale(1);
    opacity: 0;
  }
  10% { opacity: 0.4; }
  100% {
    transform: translateY(-110vh) translateX(40px) scale(1.5);
    opacity: 0;
  }
}

.bg {
  position: absolute;
  inset: 0;
  background-image: url('https://i.imgur.com/fkfWNXw.jpg');
  background-size: cover;
  background-position: center 20%;
  z-index: 0;
}

.fog-left   { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,22,14,0.96) 0%, rgba(8,22,14,0.55) 55%, transparent 100%); z-index: 1; }
.fog-bottom { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,22,14,0.75) 0%, transparent 45%); z-index: 1; }
.fog-top    { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,22,14,0.55) 0%, transparent 30%); z-index: 1; }

.panel {
  position: relative;
  z-index: 10;
  width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* rest of your styling unchanged */

.mantra {
  font-style: italic;
  font-size: 13px;
  color: rgba(143,184,160,0.6);
  letter-spacing: 1.8px;
  margin-bottom: 35px;
  line-height: 1.9;
}

.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 45px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(143,184,160,0.12);
  border-radius: 30px;
  padding: 5px;
}

.tab {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 25px;
  background: transparent;
  color: rgba(143,184,160,0.5);
  cursor: pointer;
}

.tab.active {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.35);
}

.ring-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  margin: 0 auto 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring-svg { position: absolute; top: 0; left: 0; }

.ring-center {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.time-display {
  font-family: 'Cinzel', serif;
  font-size: 58px;
  letter-spacing: 4px;
}

.mode-label {
  font-style: italic;
  font-size: 13px;
  color: var(--mist);
  margin-top: 6px;
}

.controls {
  display: flex;
  gap: 18px;
  justify-content: center;
  margin-bottom: 30px;
}

.btn-main {
  font-family: 'Cinzel', serif;
  letter-spacing: 3px;
  padding: 14px 42px;
  border-radius: 30px;
  border: 1px solid var(--gold);
  background: rgba(201,168,76,0.08);
  color: var(--gold);
  cursor: pointer;
}

.btn-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
}
</style>
</head>

<body>

<div class="scene">
  <div class="bg"></div>
  <div class="fog-left"></div>
  <div class="fog-bottom"></div>
  <div class="fog-top"></div>

  <!-- ✨ ORBS -->
  <div class="orbs" id="orbs"></div>

  <div class="panel">

    <div class="mantra">
      gate gate pāragate<br>
      pārasaṃgate · bodhi svāhā
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="pomodoro">Pomodoro</button>
      <button class="tab" data-mode="short">Short break</button>
      <button class="tab" data-mode="long">Long break</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260" width="260" height="260">
        <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(143,184,160,0.08)" stroke-width="8"/>
        <circle id="progressRing" cx="130" cy="130" r="118" fill="none"
          stroke="#c9a84c" stroke-width="7"
          stroke-dasharray="742"
          stroke-linecap="round"
          transform="rotate(-90 130 130)"/>
      </svg>

      <div class="ring-center">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="resetTimer()">↺</button>
      <button class="btn-main" id="startBtn" onclick="toggleTimer()">BEGIN</button>
      <button class="btn-icon" onclick="skipSession()">⟫</button>
    </div>

  </div>
</div>

<script>
// AUDIO
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 🔔 soft start bell
function playStartBell() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 600;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 1);
}

// 🔔 end bell (richer)
function playBell() {
  if (!audioCtx) return;
  [440,660,880].forEach((f,i)=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.4/(i+1), audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 2.5);
  });
}

// TIMER
let remainSecs = 1500;
let running=false, interval;

function toggleTimer() {
  initAudio();

  if (!running) {
    playStartBell(); // 🔔 here

    running=true;
    interval=setInterval(()=>{
      remainSecs--;
      document.getElementById("timeDisplay").textContent =
        Math.floor(remainSecs/60)+":"+String(remainSecs%60).padStart(2,"0");

      if(remainSecs<=0){
        clearInterval(interval);
        running=false;
        playBell();
      }
    },1000);
  }
}

// ✨ ORBS GENERATOR
const orbsContainer = document.getElementById('orbs');

function spawnOrb() {
  const orb = document.createElement('div');
  orb.className = 'orb';

  orb.style.left = Math.random() * 100 + 'vw';
  orb.style.animationDuration = (8 + Math.random()*6) + 's';

  orbsContainer.appendChild(orb);

  setTimeout(()=>orb.remove(), 14000);
}

setInterval(spawnOrb, 600);

</script>

</body>
</html>
