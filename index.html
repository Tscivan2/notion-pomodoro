.fog-left   { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,22,14,0.96) 0%, rgba(8,22,14,0.55) 55%, transparent 100%); z-index: 1; }
.fog-bottom { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,22,14,0.75) 0%, transparent 45%); z-index: 1; }
.fog-top    { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,22,14,0.55) 0%, transparent 30%); z-index: 1; }

.panel {
  position: relative;
  z-index: 10;
  width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.mantra {
  font-style: italic;
  font-size: 13px;
  color: rgba(143,184,160,0.6);
  letter-spacing: 1.8px;
  margin-bottom: 35px;
  line-height: 1.9;
}

.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 45px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(143,184,160,0.12);
  border-radius: 30px;
  padding: 5px;
}

.tab {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 25px;
  border: 1px solid transparent;
  background: transparent;
  color: rgba(143,184,160,0.5);
  cursor: pointer;
  transition: all 0.35s ease;
}

.tab.active {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.35);
}

.tab:hover:not(.active) {
  color: rgba(143,184,160,0.85);
}

.ring-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  margin: 0 auto 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring-svg {
  position: absolute;
  top: 0; left: 0;
}

.ring-center {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.time-display {
  font-family: 'Cinzel', serif;
  font-size: 58px;
  letter-spacing: 4px;
  transition: color 0.5s ease;
}

.mode-label {
  font-style: italic;
  font-size: 13px;
  color: var(--mist);
  margin-top: 6px;
  transition: color 0.5s ease;
}

.controls {
  display: flex;
  gap: 18px;
  justify-content: center;
  margin-bottom: 28px;
}

.btn-main {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 14px 42px;
  border-radius: 30px;
  border: 1px solid var(--gold);
  background: rgba(201,168,76,0.08);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.35s ease;
}

.btn-main:hover {
  background: rgba(201,168,76,0.18);
}

.btn-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(143,184,160,0.3);
  background: transparent;
  color: rgba(143,184,160,0.6);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-icon:hover {
  border-color: rgba(143,184,160,0.7);
  color: var(--mist);
}

/* ── SESSION DOTS ── */
.session-dots {
  display: flex;
  gap: 11px;
  justify-content: center;
  margin-bottom: 18px;
}

.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1px solid rgba(143,184,160,0.35);
  background: transparent;
  transition: all 0.5s ease;
}

.dot.current {
  border-color: var(--gold);
  box-shadow: 0 0 7px rgba(201,168,76,0.55);
  background: rgba(201,168,76,0.25);
}

.dot.done {
  border-color: rgba(143,184,160,0.6);
  background: rgba(143,184,160,0.3);
}

/* ── FOOTER PHRASE ── */
.footer-phrase {
  font-style: italic;
  font-size: 12px;
  color: rgba(143,184,160,0.38);
  letter-spacing: 0.8px;
  transition: opacity 0.8s ease;
}

/* ── ORBS ── */
.orbs {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.orb {
  position: absolute;
  bottom: -20px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(143,184,160,0.7), transparent 70%);
  opacity: 0.3;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 0; }
  10%  { opacity: 0.35; }
  to   { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="scene">
  <div class="bg" id="bg"></div>
  <div class="orbs" id="orbs"></div>
  <div class="fog-left"></div>
  <div class="fog-bottom"></div>
  <div class="fog-top"></div>

  <div class="panel">

    <div class="mantra">
      gate gate pāragate<br>
      pārasaṃgate · bodhi svāhā
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="pomodoro">Pomodoro</button>
      <button class="tab" data-mode="short">Short break</button>
      <button class="tab" data-mode="long">Long break</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260" width="260" height="260">
        <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(143,184,160,0.08)" stroke-width="8"/>
        <circle id="progressRing" cx="130" cy="130" r="118" fill="none"
          stroke="#c9a84c" stroke-width="7"
          stroke-dasharray="742"
          stroke-dashoffset="0"
          stroke-linecap="round"
          transform="rotate(-90 130 130)"
          style="transition: stroke-dashoffset 1s linear, stroke 0.5s ease;"/>
      </svg>

      <div class="ring-center" id="timerClickArea">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="resetTimer()">↺</button>
      <button class="btn-main" id="startBtn" onclick="toggleTimer()">BEGIN</button>
      <button class="btn-icon" onclick="skipSession()">⟫</button>
    </div>

    <!-- SESSION DOTS -->
    <div class="session-dots">
      <div class="dot current" id="dot0"></div>
      <div class="dot"         id="dot1"></div>
      <div class="dot"         id="dot2"></div>
      <div class="dot"         id="dot3"></div>
    </div>

    <!-- FOOTER PHRASE -->
    <div class="footer-phrase" id="footerPhrase">session 1 of 4 · breathe deeply</div>

  </div>
</div>

<script>

// ── AUDIO ──────────────────────────────────────────────
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBell() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [440, 660, 880].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    g.gain.setValueAtTime(0.3 / (i + 1), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start(now);
    o.stop(now + 2);
  });
}

// ── CONFIG ─────────────────────────────────────────────
const MODES = {
  pomodoro: { duration: 25 * 60, label: 'focus',     ringColor: '#c9a84c' },
  short:    { duration:  5 * 60, label: 'rest',       ringColor: '#4aab7a' },
  long:     { duration: 15 * 60, label: 'long rest',  ringColor: '#8fb8a0' }
};

const PHRASES = [
  'breathe deeply', 'be present', 'let go', 'just sit',
  'observe the breath', 'return to stillness', 'nothing to do', 'rest in awareness'
];

const CIRC = 742;

// ── STATE ──────────────────────────────────────────────
let currentMode = 'pomodoro';
let totalSecs   = MODES.pomodoro.duration;
let remainSecs  = totalSecs;
let running     = false;
let interval    = null;
let currentSession = 0; // 0–3

// ── ELEMENTS ───────────────────────────────────────────
const ring      = document.getElementById('progressRing');
const timeDisp  = document.getElementById('timeDisplay');
const modeLabel = document.getElementById('modeLabel');
const startBtn  = document.getElementById('startBtn');
const footer    = document.getElementById('footerPhrase');

// ── HELPERS ────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60), ss = s % 60;
  return m + ':' + (ss < 10 ? '0' : '') + ss;
}

function updateDisplay() {
  timeDisp.textContent = fmt(remainSecs);
  const offset = CIRC * (1 - remainSecs / totalSecs);
  ring.style.strokeDashoffset = offset.toFixed(1);
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'dot';
    if (i === currentSession) d.classList.add('current');
    else if (i < currentSession) d.classList.add('done');
  }
}

function updateFooter(custom) {
  const phrase = custom || PHRASES[Math.floor(Math.random() * PHRASES.length)];
  footer.textContent = 'session ' + (currentSession + 1) + ' of 4 · ' + phrase;
}

// ── TAB SWITCHING ──────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn || btn.dataset.mode === currentMode) return;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  clearInterval(interval);
  running = false;
  currentMode = btn.dataset.mode;
  totalSecs   = MODES[currentMode].duration;
  remainSecs  = totalSecs;
  modeLabel.textContent = MODES[currentMode].label;
  ring.style.stroke     = MODES[currentMode].ringColor;
  startBtn.textContent  = 'BEGIN';
  updateDisplay();
  updateFooter(currentMode === 'pomodoro' ? 'breathe deeply' : (currentMode === 'short' ? 'rest now' : 'deep rest'));
});

// ── TIMER ──────────────────────────────────────────────
function toggleTimer() {
  initAudio();

  if (running) {
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'RESUME';
  } else {
    playBell(); // 🔔 bell on begin / resume

    running = true;
    startBtn.textContent = 'PAUSE';

    interval = setInterval(() => {
      if (remainSecs > 0) {
        remainSecs--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'BEGIN';
        onComplete();
      }
    }, 1000);
  }
}

function onComplete() {
  playBell();
  if (currentMode === 'pomodoro') {
    currentSession = (currentSession + 1) % 4;
    updateDots();
    updateFooter('session complete · rest now');
  } else {
    updateFooter('rest complete · ready to focus');
  }
  remainSecs = totalSecs;
  updateDisplay();
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  remainSecs = totalSecs;
  startBtn.textContent = 'BEGIN';
  updateDisplay();
  updateFooter();
}

function skipSession() {
  clearInterval(interval);
  running = false;
  if (currentMode === 'pomodoro') {
    currentSession = (currentSession + 1) % 4;
    updateDots();
  }
  remainSecs = totalSecs;
  startBtn.textContent = 'BEGIN';
  updateDisplay();
  updateFooter();
}

// ── ORBS ───────────────────────────────────────────────
const orbsEl = document.getElementById('orbs');

setInterval(() => {
  const o = document.createElement('div');
  o.className = 'orb';
  o.style.left            = Math.random() * 100 + 'vw';
  o.style.animationDuration = (6 + Math.random() * 6) + 's';
  orbsEl.appendChild(o);
  setTimeout(() => o.remove(), 12000);
}, 700);

// ── INIT ───────────────────────────────────────────────
updateDisplay();
updateDots();
updateFooter('breathe deeply');

</script>
</body>
</html>
