<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --jade-deep: #0a1f14;
      --mist: #8fb8a0;
      --gold: #c9a84c;
      --cream: #f0ebe0;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--jade-deep);
      overflow: hidden;
      font-family: 'EB Garamond', serif;
      color: var(--cream);
    }
    .scene { position: relative; width: 100%; height: 100vh; display: flex; align-items: stretch; }
    .bg {
      position: absolute; inset: 0;
      background-image: url('https://i.imgur.com/fkfWNXw.jpg');
      background-size: cover; background-position: center 20%; z-index: 0;
    }
    .fog-left   { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,22,14,0.96) 0%, rgba(8,22,14,0.55) 55%, transparent 100%); z-index: 1; }
    .fog-bottom { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,22,14,0.75) 0%, transparent 45%); z-index: 1; }
    .fog-top    { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,22,14,0.55) 0%, transparent 30%); z-index: 1; }

    .panel {
      position: relative; z-index: 10; width: 440px; flex-shrink: 0;
      display: flex; flex-direction: column; justify-content: center; padding: 60px 55px;
    }
    .panel::after {
      content: ''; position: absolute; right: 0; top: 15%; bottom: 15%;
      width: 1px; background: linear-gradient(to bottom, transparent, rgba(143,184,160,0.25), rgba(201,168,76,0.35), transparent);
    }

    .mantra { font-style: italic; font-size: 13px; color: rgba(143,184,160,0.6); letter-spacing: 1.8px; margin-bottom: 35px; line-height: 1.9; }

    .tabs {
      display: flex; gap: 6px; margin-bottom: 45px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(143,184,160,0.12);
      border-radius: 30px; padding: 5px;
    }
    .tab {
      font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1.6px;
      text-transform: uppercase; padding: 9px 18px; border-radius: 25px;
      background: transparent; color: rgba(143,184,160,0.5); cursor: pointer;
    }
    .tab.active {
      background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.35);
    }

    .ring-wrap {
      position: relative; width: 260px; height: 260px; margin: 0 auto 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring-center {
      position: relative; z-index: 2; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; cursor: pointer;
    }
    .time-display {
      font-family: 'Cinzel', serif; font-size: 58px; font-weight: 500;
      letter-spacing: 4px; text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }
    .mode-label {
      font-style: italic; font-size: 13px; color: var(--mist);
      letter-spacing: 2.5px; margin-top: 6px;
    }

    .controls {
      display: flex; gap: 18px; justify-content: center; margin-bottom: 30px;
    }
    .btn-main {
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; padding: 14px 42px; border-radius: 30px;
      border: 1px solid var(--gold); background: rgba(201,168,76,0.08);
      color: var(--gold); cursor: pointer;
    }
    .btn-icon {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(143,184,160,0.3);
      background: transparent; color: rgba(143,184,160,0.6); font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="fog-left"></div>
  <div class="fog-bottom"></div>
  <div class="fog-top"></div>

  <div class="panel">
    <div class="mantra">
      gate gate pāragate<br>
      pārasaṃgate · bodhi svāhā
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="pomodoro">Pomodoro</button>
      <button class="tab" data-mode="short">Short break</button>
      <button class="tab" data-mode="long">Long break</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260" width="260" height="260">
        <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(143,184,160,0.08)" stroke-width="8"/>
        <circle id="progressRing" cx="130" cy="130" r="118" fill="none" 
          stroke="#c9a84c" stroke-width="7" stroke-dasharray="742" stroke-dashoffset="0"
          stroke-linecap="round" transform="rotate(-90 130 130)" 
          style="transition: stroke-dashoffset 0.6s linear;"/>
      </svg>
      <div class="ring-center" id="timerClickArea">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="resetTimer()">↺</button>
      <button class="btn-main" id="startBtn" onclick="toggleTimer()">BEGIN</button>
      <button class="btn-icon" onclick="skipSession()">⟫</button>
    </div>
  </div>
</div>

<script>
  let durations = { pomodoro: 25, short: 5, long: 15 };
  let currentMode = 'pomodoro';
  let totalSecs = durations.pomodoro * 60;
  let remainSecs = totalSecs;
  let running = false;
  let interval = null;

  const ring = document.getElementById('progressRing');
  const timeDisp = document.getElementById('timeDisplay');
  const modeLabel = document.getElementById('modeLabel');
  const startBtn = document.getElementById('startBtn');
  const timerClickArea = document.getElementById('timerClickArea');

  // Louder & more reliable meditation bell
  const bell = new Audio('https://www.orangefreesounds.com/wp-content/uploads/2018/03/Meditation-bell-sound.mp3');
  bell.volume = 0.95;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${m}:${ss < 10 ? '0' : ''}${ss}`;
  }

  function updateDisplay() {
    timeDisp.textContent = fmt(remainSecs);
    const progress = (remainSecs / totalSecs) * 742;
    ring.style.strokeDashoffset = (742 - progress).toFixed(1);
  }

  function setMode(mode) {
    clearInterval(interval);
    running = false;
    currentMode = mode;
    totalSecs = durations[mode] * 60;
    remainSecs = totalSecs;
    modeLabel.textContent = mode === 'pomodoro' ? 'focus' : mode === 'short' ? 'rest' : 'long rest';
    startBtn.textContent = 'BEGIN';
    updateDisplay();
  }

  function toggleTimer() {
    if (running) {
      clearInterval(interval);
      running = false;
      startBtn.textContent = 'RESUME';
    } else {
      running = true;
      startBtn.textContent = 'PAUSE';
      interval = setInterval(() => {
        if (remainSecs > 0) {
          remainSecs--;
          updateDisplay();
        } else {
          clearInterval(interval);
          running = false;
          startBtn.textContent = 'BEGIN';
          
          bell.currentTime = 0;
          bell.play().catch(e => console.log("Sound blocked:", e));
          
          timeDisp.style.color = '#c9a84c';
          setTimeout(() => timeDisp.style.color = '', 2500);
        }
      }, 1000);
    }
  }

  function resetTimer() { clearInterval(interval); running = false; remainSecs = totalSecs; startBtn.textContent = 'BEGIN'; updateDisplay(); }
  function skipSession() { resetTimer(); }

  // Click time to set duration (supports seconds)
  timerClickArea.addEventListener('click', () => {
    if (running) return;
    let input = prompt(`Set ${currentMode} time:\n\nExamples:\n25 → 25 minutes\n5:30 → 5 min 30 sec\n90 → 90 seconds`, durations[currentMode]);
    if (input === null) return;

    let totalSeconds = 0;
    if (input.includes(':')) {
      const [m, s] = input.split(':').map(Number);
      totalSeconds = (m || 0) * 60 + (s || 0);
    } else {
      totalSeconds = parseFloat(input) * 60;
    }

    if (totalSeconds > 0) {
      durations[currentMode] = totalSeconds / 60;
      totalSecs = Math.floor(totalSeconds);
      remainSecs = totalSecs;
      updateDisplay();
    }
  });

  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      setMode(btn.dataset.mode);
    }
  });

  // Unlock audio
  document.addEventListener('click', () => { bell.volume = 0.95; }, { once: true });

  updateDisplay();
</script>
</body>
</html>
