<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep: #0a1f14;
  --mist: #8fb8a0;
  --gold: #c9a84c;
  --cream: #f0ebe0;
}

html, body {
  width: 100%; height: 100%;
  background: var(--jade-deep);
  overflow: hidden;
  font-family: 'EB Garamond', serif;
  color: var(--cream);
}

.scene {
  position: relative;
  width: 100%; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bg {
  position: absolute;
  inset: 0;
  background-image: url('https://i.imgur.com/fkfWNXw.jpg');
  background-size: cover;
  background-position: center 20%;
  z-index: 0;
}

.fog-left   { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,22,14,0.96) 0%, rgba(8,22,14,0.55) 55%, transparent 100%); z-index: 1; }
.fog-bottom { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,22,14,0.75) 0%, transparent 45%); z-index: 1; }
.fog-top    { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,22,14,0.55) 0%, transparent 30%); z-index: 1; }

.panel {
  position: relative;
  z-index: 10;
  width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.mantra {
  font-style: italic;
  font-size: 13px;
  color: rgba(143,184,160,0.6);
  letter-spacing: 1.8px;
  margin-bottom: 35px;
  line-height: 1.9;
}

.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 45px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(143,184,160,0.12);
  border-radius: 30px;
  padding: 5px;
}

.tab {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 25px;
  background: transparent;
  color: rgba(143,184,160,0.5);
  cursor: pointer;
}

.tab.active {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.35);
}

.ring-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  margin: 0 auto 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring-svg {
  position: absolute;
  top: 0; left: 0;
}

.ring-center {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.time-display {
  font-family: 'Cinzel', serif;
  font-size: 58px;
  letter-spacing: 4px;
}

.mode-label {
  font-style: italic;
  font-size: 13px;
  color: var(--mist);
  margin-top: 6px;
}

.controls {
  display: flex;
  gap: 18px;
  justify-content: center;
  margin-bottom: 30px;
}

.btn-main {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 14px 42px;
  border-radius: 30px;
  border: 1px solid var(--gold);
  background: rgba(201,168,76,0.08);
  color: var(--gold);
  cursor: pointer;
}

.btn-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(143,184,160,0.3);
  background: transparent;
  color: rgba(143,184,160,0.6);
  font-size: 18px;
  cursor: pointer;
}

/* =========================
   🌫️ ORBS (ADDED ONLY)
========================= */
.orbs {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.orb {
  position: absolute;
  bottom: -20px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(143,184,160,0.7), transparent 70%);
  opacity: 0.3;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 0; }
  10% { opacity: 0.35; }
  to { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="scene">
  <div class="bg"></div>
  <div class="orbs" id="orbs"></div>
  <div class="fog-left"></div>
  <div class="fog-bottom"></div>
  <div class="fog-top"></div>

  <div class="panel">

    <div class="mantra">
      gate gate pāragate<br>
      pārasaṃgate · bodhi svāhā
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="pomodoro">Pomodoro</button>
      <button class="tab" data-mode="short">Short break</button>
      <button class="tab" data-mode="long">Long break</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260" width="260" height="260">
        <circle cx="130" cy="130" r="118" fill="none" stroke="rgba(143,184,160,0.08)" stroke-width="8"/>
        <circle id="progressRing" cx="130" cy="130" r="118" fill="none"
          stroke="#c9a84c" stroke-width="7"
          stroke-dasharray="742"
          stroke-dashoffset="0"
          stroke-linecap="round"
          transform="rotate(-90 130 130)"/>
      </svg>

      <div class="ring-center" id="timerClickArea">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="resetTimer()">↺</button>
      <button class="btn-main" id="startBtn" onclick="toggleTimer()">BEGIN</button>
      <button class="btn-icon" onclick="skipSession()">⟫</button>
    </div>

  </div>
</div>

<script>

// =======================
// 🔊 AUDIO (ONLY ADDITION: BEGIN BELL)
// =======================
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBell() {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  [440, 660, 880].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.frequency.value = f;
    g.gain.setValueAtTime(0.3/(i+1), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2);

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start(now);
    o.stop(now + 2);
  });
}

// =======================
// TIMER (UNCHANGED)
// =======================
let durations = { pomodoro: 25, short: 5, long: 15 };
let currentMode = 'pomodoro';
let totalSecs = durations.pomodoro * 60;
let remainSecs = totalSecs;
let running = false;
let interval = null;

const ring = document.getElementById('progressRing');
const timeDisp = document.getElementById('timeDisplay');
const startBtn = document.getElementById('startBtn');

function fmt(s){
  const m=Math.floor(s/60);
  const ss=s%60;
  return `${m}:${ss<10?'0':''}${ss}`;
}

function updateDisplay(){
  timeDisp.textContent = fmt(remainSecs);
  const progress = (remainSecs / totalSecs) * 742;
  ring.style.strokeDashoffset = (742 - progress).toFixed(1);
}

function toggleTimer(){
  initAudio();

  if(running){
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'RESUME';
  } else {
    playBell(); // 🔔 BEGIN SOUND ADDED HERE

    running = true;
    startBtn.textContent = 'PAUSE';

    interval = setInterval(()=>{
      if(remainSecs > 0){
        remainSecs--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'BEGIN';
      }
    },1000);
  }
}

function resetTimer(){
  clearInterval(interval);
  running = false;
  remainSecs = totalSecs;
  startBtn.textContent = 'BEGIN';
  updateDisplay();
}

// =======================
// 🌫️ ORBS
// =======================
const orbs = document.getElementById('orbs');

setInterval(()=>{
  const o = document.createElement('div');
  o.className = 'orb';
  o.style.left = Math.random()*100 + 'vw';
  o.style.animationDuration = (6 + Math.random()*6) + 's';
  orbs.appendChild(o);
  setTimeout(()=>o.remove(), 12000);
}, 700);

updateDisplay();

</script>

</body>
</html>
