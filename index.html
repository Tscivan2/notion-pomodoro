<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Pomodoro</title>

<style>
body {
  background: #0a1f14;
  color: #f0ebe0;
  font-family: sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

button {
  padding: 12px 24px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div>
  <h2 id="time">10</h2>
  <button onclick="start()">Start</button>
  <button onclick="testSound()">🔊 Test Sound</button>
</div>

<script>

// 🔊 Embedded sound (no internet needed)
const bell = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");

// 🔓 Unlock audio on first click
document.addEventListener('click', () => {
  bell.play().then(() => {
    bell.pause();
    bell.currentTime = 0;
    console.log("Audio unlocked");
  }).catch(e => console.log("Unlock failed:", e));
}, { once: true });

function playBell() {
  bell.currentTime = 0;
  bell.play().then(() => {
    console.log("Bell played");
  }).catch(e => {
    console.log("Play failed:", e);
    alert("Sound blocked 😭 — check browser settings");
  });
}

// 🧪 manual test
function testSound() {
  playBell();
}

// ⏱ simple timer test
let t = 10;
let int;

function start() {
  clearInterval(int);
  t = 10;
  document.getElementById("time").textContent = t;

  int = setInterval(() => {
    t--;
    document.getElementById("time").textContent = t;

    if (t <= 0) {
      clearInterval(int);
      playBell();
    }
  }, 1000);
}

</script>

</body>
</html>
