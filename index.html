<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Pomodoro</title>

<style>
body {
  background: #0a1f14;
  color: #f0ebe0;
  font-family: sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

button {
  padding: 12px 24px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div>
  <h2 id="time">10</h2>
  <button onclick="start()">Start</button>
  <button onclick="testSound()">🔊 Test Sound</button>
</div>

<script>

let audioCtx;

// 🔓 Must be created on user interaction
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    console.log("AudioContext started");
  }
}

// 🔔 Zen bell sound (sine wave + fade)
function playBell() {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(440, audioCtx.currentTime); // tone

  gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 2);
}

// 🧪 manual test
function testSound() {
  initAudio();
  playBell();
}

// ⏱ timer
let t = 10;
let int;

function start() {
  initAudio();

  clearInterval(int);
  t = 10;
  document.getElementById("time").textContent = t;

  int = setInterval(() => {
    t--;
    document.getElementById("time").textContent = t;

    if (t <= 0) {
      clearInterval(int);
      playBell();
    }
  }, 1000);
}

</script>

</body>
</html>
